  study_design: 'Subjects piloted a simulated drone through circular waypoints using a flight joystick, controlling roll and
    pitch while the drone maintained constant velocity. In offline session: 32 trajectories each with constant difficulty
    level (v-shape design from level 16 to 1 and back to 16), each trajectory had 32 waypoints and lasted ~90 seconds. In
    online sessions: each condition consisted of 12 trajectories with 33 waypoints and 8 decision points per trajectory.'
  synchronicity: cue-based
  trial_duration: 90.0
file_format: gdf
methodology: 'The study compared two conditions for difficulty regulation during a simulated drone piloting task: (1) EEG-based
  automatic difficulty adjustment using real-time decoding of perceived difficulty, and (2) Manual self-paced adjustment where
  subjects pressed a button when they found the level easy. Each subject participated in one offline session (for building
  subject-specific decoders) and two online sessions (each containing both EEG and Manual conditions in counterbalanced order).
  The task involved piloting a drone through circular waypoints with 16 difficulty levels defined by waypoint radius. Features
  were extracted using Thomson''s multitaper algorithm with 2-second sliding windows, and classification used generalized
  linear models with elastic net regularization followed by LDA. The study evaluated both decoding accuracy and behavioral
  outcomes (task scores, skill curves, learning patterns).'
